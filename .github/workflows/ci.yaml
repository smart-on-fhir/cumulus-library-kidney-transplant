name: CI
on:
  pull_request:
    branches:
      - main
jobs:

  unittest:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Get library from main
        run: pip install git+https://github.com/smart-on-fhir/cumulus-library.git

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"
      - name: Test with pytest
        run: |
          python -m pytest --cov-report xml --cov=cumulus_library_kidney_transplant tests
      - name: Log missing coverage
        run: |
          coverage report -m --skip-covered
      - name: Generate coverage report
        if: github.ref != 'refs/heads/main'
        uses: orgoro/coverage@v3.2
        with:
            coverageFile: coverage.xml
            token: ${{ secrets.GITHUB_TOKEN }}
            thresholdAll: 0
            thresholdNew: 0
            thresholdModified: 0
           
  # Check that Generated Files are Up-to-Date
  check-generated-files:
    name: check generated files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "."

      - name: Run create_model_summary.py
        run: python cumulus_library_kidney_transplant/llm/create_model_summary.py

      - name: Run create_schema.py
        run: python cumulus_library_kidney_transplant/llm/create_schema.py

      - name: Run create_sql_examples.py
        run: python cumulus_library_kidney_transplant/llm/create_sql_examples.py

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code -- \
            cumulus_library_kidney_transplant/llm/summaries/ \
            cumulus_library_kidney_transplant/llm/schemas/ \
            cumulus_library_kidney_transplant/llm/athena/ \
          || (echo "Generated files are out of date. Run the scripts locally and commit the results." && exit 1)

  

  